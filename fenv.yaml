version: "1"
networks:
  - name: fenv-net
    subnet: 10.10.0.0/24
    nat_enabled: true
    nat_gateways:
      - wlo1
    default: true
keys:
  - name: fenv-key
    algorithm: ed25519
    default: true
    force: true
images:
  - name: ubuntu-noble
    type: ubuntu
    version: noble
    default: true
binaries:
  - name: fc-16
    type: firecracker
    version: 1.16.0
    default: true
kernels:
  - name: fenv-vmlinux
    type: official
    version: 7.0.11
    default: true
    features: kvm,nftables,tuntap
vms:
  - name: fenv-vm-1
    depends_on: ['network:fenv-net', 'key:fenv-key', 'image:ubuntu-noble', 'binary:fc-16', 'kernel:fenv-vmlinux']
    disk_size: 20G
    network: fenv-net
    key: fenv-key
    image: ubuntu-noble
    kernel: fenv-vmlinux
    binary: fc-16
ssh:
  - name: install qemu-utils
    depends_on: ['vm:fenv-vm-1', 'key:fenv-key']
    target: fenv-vm-1
    key: fenv-key
    user: root
    timeout: 150
    cmd: |
      apt-get update && \
      apt-get install -y qemu-utils
  - name: install net-tools
    depends_on: ['vm:fenv-vm-1', 'key:fenv-key']
    target: fenv-vm-1
    key: fenv-key
    timeout: 150
    user: root
    cmd: |
      apt-get update && \
      apt-get install -y net-tools
copy:
  - name: copy mvm
    depends_on: ['vm:fenv-vm-1', 'key:fenv-key']
    target: fenv-vm-1
    user: root
    key: fenv-key
    src: ./mvm
    dst: /root/
