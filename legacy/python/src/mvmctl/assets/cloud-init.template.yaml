# Cloud-init template for mvmctl VMs
# All sections are rendered together; Jinja2 placeholders are substituted at runtime.
user_data: |
  #cloud-config
  datasource:
    NoCloud:
      seedfrom: /
  # Hostname configuration (will be replaced by setup scripts)
  hostname: {{vm_name}}
  fqdn: {{vm_name}}.local

  # DNS Configuration
  manage_resolv_conf: true
  resolv_conf:
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
    searchdomains:
      - local

  users:
    - default
    {% if ssh_pubkeys %}
    - name: {{user}}
      groups: sudo
      shell: /bin/bash
      sudo: ALL=(ALL) NOPASSWD:ALL
      ssh-authorized-keys:
        {% for key in ssh_pubkeys %}- {{key}}
        {% endfor %}
    {% endif %}

  {% if ssh_pubkeys %}
    - name: human
      sudo: ALL=(ALL) NOPASSWD:ALL
      groups: users, admin
      home: /home/human
      shell: /bin/bash
      lock_passwd: false
      passwd: {{ password_hash }}
      ssh-authorized-keys:
        {% for key in ssh_pubkeys %}- {{key}}
        {% endfor %}
    {% endif %}

  package_update: false
  package_upgrade: false
  packages:
    - openssh-server
    - curl
    - wget
    - git
    - net-tools
    - vim
    - tmux
    - netcat-openbsd
    - iputils-ping
    - htop
    - cloud-init

  runcmd:
    - systemctl disable --now snapd.appliance.service 2>/dev/null || true
    {% if ssh_pubkeys %}
    - systemctl enable --now sshd || systemctl enable --now ssh
    {% endif %}

  final_message: "[x] VM provisioned via MVMCTL"
meta_data: |
  instance-id: {{vm_name}}
  local-hostname: {{vm_name}}
# Network configuration for cloud-init netplan/systemd-networkd
# NOTE: This is IGNORED when kernel ip= parameter is present (kernel has absolute priority)
# The kernel ip= parameter already configures the network, this is kept for documentation purposes
network_config: |
  version: 2
  ethernets:
    eth0:
      dhcp4: false
      dhcp6: false
      addresses:
        - {{guest_ip}}/{{prefix_len}}
      routes:
        - to: default
          via: {{ipv4_gateway}}
      nameservers:
        addresses:
          - 8.8.8.8
          - 1.1.1.1
nocloud_cfg: |
  datasource_list:
    - NoCloud
  datasource:
    NoCloud:
      seedfrom: /
