version: "1"

network:
  - name: k8s
    subnet: "10.10.0.0/16"
    nat_enabled: true

key:
  - name: k8s-key
    algorithm: ed25519

kernel:
  - name: full-kernel
    type: official
    version: "7.0.11"
    features: "all"

binary:
  - name: fc-binary
    type: firecracker
    version: "1.16.0"

vm:
  - name: worker-1
    network: k8s
    guest_ip: 10.10.0.20
    key: k8s-key
    image: k8s-base
    kernel: full-kernel
    binary: fc-binary
    vcpu: 1
    mem: 2G
    disk_size: 8G
    writeback: true
    allow_remote_exec: true
    depends_on:
      - network:k8s
      - key:k8s-key
      - kernel:full-kernel
      - binary:fc-binary

  - name: worker-2
    network: k8s
    guest_ip: 10.10.0.21
    key: k8s-key
    image: k8s-base
    kernel: full-kernel
    binary: fc-binary
    vcpu: 1
    mem: 2G
    disk_size: 8G
    writeback: true
    allow_remote_exec: true
    depends_on:
      - network:k8s
      - key:k8s-key
      - kernel:full-kernel
      - binary:fc-binary

  - name: worker-3
    network: k8s
    guest_ip: 10.10.0.22
    key: k8s-key
    image: k8s-base
    kernel: full-kernel
    binary: fc-binary
    vcpu: 1
    mem: 2G
    disk_size: 8G
    writeback: true
    allow_remote_exec: true
    depends_on:
      - network:k8s
      - key:k8s-key
      - kernel:full-kernel
      - binary:fc-binary

exec:
  - name: seed-token
    target: controller-1
    cmd: timeout 10 k8s-seed-token

  - name: join-w1
    target: worker-1
    cmd: |
      hostnamectl set-hostname worker-1 2>/dev/null || true
      timeout 120 k8s-join controller-1 join-worker
    depends_on:
      - exec:seed-token
      - vm:worker-1

  - name: join-w2
    target: worker-2
    cmd: |
      hostnamectl set-hostname worker-2 2>/dev/null || true
      timeout 120 k8s-join controller-1 join-worker
    depends_on:
      - exec:seed-token
      - vm:worker-2

  - name: join-w3
    target: worker-3
    cmd: |
      hostnamectl set-hostname worker-3 2>/dev/null || true
      timeout 120 k8s-join controller-1 join-worker
    depends_on:
      - exec:seed-token
      - vm:worker-3
