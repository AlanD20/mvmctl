kernel-official:
  type: official
  version: "6.19.9"
  resolver: http-dir
  versions_url: "https://cdn.kernel.org/pub/linux/kernel/"
  source: https://cdn.kernel.org/pub/linux/kernel/v{series}.x/linux-{version}.tar.xz
  sha256: null
  sha256_url: "https://cdn.kernel.org/pub/linux/kernel/v{series}.x/sha256sums.asc"
  base_config_url_template: "https://raw.githubusercontent.com/firecracker-microvm/firecracker/main/resources/guest_configs/microvm-kernel-ci-{arch}-6.1.config"
  config_fragments: []
  output_name: vmlinux-official
  build_dir: /tmp/mvmctl/kernel-build
  parallel_jobs: null
  default_configs:
    # Filesystems
    CONFIG_EXT4_FS: y
    CONFIG_EXT4_FS_POSIX_ACL: y
    CONFIG_XFS_FS: y
    CONFIG_SQUASHFS: y
    # VirtIO (all must be built-in for Firecracker)
    CONFIG_VIRTIO: y
    CONFIG_VIRTIO_MENU: y
    CONFIG_VIRTIO_MMIO: y
    CONFIG_VIRTIO_PCI: y
    CONFIG_VIRTIO_BLK: y
    CONFIG_VIRTIO_NET: y
    CONFIG_VIRTIO_CONSOLE: y
    # Serial console
    CONFIG_SERIAL_8250: y
    CONFIG_SERIAL_8250_CONSOLE: y
    # Network
    CONFIG_NET: y
    CONFIG_INET: y
    CONFIG_IPV6: y
    # KVM guest optimisations
    CONFIG_KVM_GUEST: y
    CONFIG_PARAVIRT: y
    # Security / BPF / cgroups
    CONFIG_SECURITY_LANDLOCK: y
    CONFIG_BPF_SYSCALL: y
    CONFIG_CGROUPS: y
    CONFIG_MEMCG: y
    # PCI (required for some upstream kernels)
    CONFIG_PCI: y
    CONFIG_CRYPTO_SHA1: y
    CONFIG_CRYPTO_USER_API_HASH: y
    # Disabled
    CONFIG_BLK_DEV_ZONED: n
    CONFIG_VIRTIO_BLK_F_SECURE_ERASE: n
    CONFIG_VIRTIO_BLK_SCSI: n
    # Set-val
    CONFIG_SERIAL_8250_NR_UARTS: "4"
  features:
    kvm:
      desc: "Nested KVM virtualization (host modules)"
      enforce:
        CONFIG_VIRTUALIZATION: y
        CONFIG_KVM: y
        CONFIG_KVM_INTEL: y
        CONFIG_KVM_AMD: y
    nftables:
      desc: "nftables NAT firewall backend"
      enforce:
        CONFIG_NFT_NAT: y
        CONFIG_NF_TABLES_INET: y
        CONFIG_NF_NAT_MASQUERADE: y
        CONFIG_NFT_MASQ: y
    tuntap:
      desc: "TUN/TAP device support (required for VM networking)"
      enforce:
        CONFIG_TUN: y
    btrfs:
      desc: "Btrfs filesystem support"
      enforce:
        CONFIG_BTRFS_FS: y
        CONFIG_BTRFS_FS_POSIX_ACL: y
    containers:
      desc: "Container runtime core (containerd/runc/kubelet)"
      enforce:
        # Expose running kernel config via /proc/config.gz
        CONFIG_IKCONFIG: y
        CONFIG_IKCONFIG_PROC: y
        CONFIG_NAMESPACES: y
        CONFIG_NET_NS: y
        CONFIG_PID_NS: y
        CONFIG_IPC_NS: y
        CONFIG_UTS_NS: y
        CONFIG_USER_NS: y
        CONFIG_CGROUPS: y
        CONFIG_CGROUP_BPF: y
        CONFIG_CGROUP_PIDS: y
        CONFIG_CGROUP_SCHED: y
        CONFIG_CGROUP_CPUACCT: y
        CONFIG_CGROUP_DEVICES: y
        CONFIG_CGROUP_FREEZER: y
        CONFIG_CGROUP_MEMORY: y
        CONFIG_CGROUP_HUGETLB: y
        CONFIG_CPUSETS: y
        CONFIG_MEMCG: y
        CONFIG_FAIR_GROUP_SCHED: y
        CONFIG_CFS_BANDWIDTH: y
        CONFIG_SECCOMP: y
        CONFIG_SECCOMP_FILTER: y
        CONFIG_OVERLAY_FS: y
        CONFIG_NET_CLS_CGROUP: y
        CONFIG_SCHEDSTATS: y
    iptables:
      desc: "iptables kube-proxy backend"
      enforce:
        CONFIG_NETFILTER: y
        CONFIG_NF_CONNTRACK: y
        CONFIG_NETFILTER_XTABLES: y
        CONFIG_NETFILTER_XT_MATCH_COMMENT: y
        CONFIG_NETFILTER_XT_MATCH_STATISTIC: y
        CONFIG_NETFILTER_XT_MATCH_MULTIPORT: y
        CONFIG_NETFILTER_XT_MATCH_RECENT: y
        CONFIG_NETFILTER_XT_MATCH_LENGTH: y
        CONFIG_NETFILTER_XT_MATCH_LIMIT: y
        CONFIG_NETFILTER_XT_MATCH_DSCP: y
        CONFIG_NETFILTER_XT_MATCH_OWNER: y
        CONFIG_NETFILTER_XT_MATCH_CGROUP: y
        CONFIG_NETFILTER_XT_MATCH_IPVS: y
        CONFIG_NETFILTER_XT_MATCH_STRING: y
        CONFIG_NETFILTER_XT_MATCH_BPF: y
        CONFIG_NETFILTER_XT_MATCH_HELPER: y
        CONFIG_NETFILTER_XT_MATCH_QUOTA: y
        CONFIG_NETFILTER_XT_MATCH_PKTTYPE: y
        # Targets
        CONFIG_NETFILTER_XT_TARGET_LOG: y
        CONFIG_NETFILTER_XT_TARGET_NFLOG: y
        CONFIG_NETFILTER_XT_TARGET_TCPMSS: y
        CONFIG_NETFILTER_XT_TARGET_DSCP: y
        CONFIG_NETFILTER_XT_TARGET_CLASSIFY: y
        CONFIG_NETFILTER_XT_TARGET_CHECKSUM: y
        CONFIG_NETFILTER_XT_TARGET_TRACE: y
        CONFIG_NETFILTER_XT_MATCH_CONNTRACK: y
        CONFIG_NETFILTER_XT_MATCH_STATE: y
        CONFIG_NETFILTER_XT_TARGET_REDIRECT: y
        CONFIG_NETFILTER_XT_MARK: y
        CONFIG_NETFILTER_XT_TARGET_MARK: y
        CONFIG_NETFILTER_XT_MATCH_MARK: y
        CONFIG_NETFILTER_XT_CONNMARK: y
        CONFIG_NETFILTER_XT_TARGET_CONNMARK: y
        CONFIG_NETFILTER_XT_TARGET_CT: y
        CONFIG_NETFILTER_XT_SET: y
        CONFIG_IP_SET: y
        CONFIG_IP_SET_HASH_IP: y
        CONFIG_IP_SET_HASH_NET: y
        CONFIG_IP_NF_FILTER: y
        CONFIG_IP_NF_TARGET_REJECT: y
        CONFIG_IP_NF_NAT: y
        CONFIG_IP_NF_TARGET_MASQUERADE: y
        CONFIG_BRIDGE_NETFILTER: y
        CONFIG_NETFILTER_NETLINK: y

    cni-bridge:
      desc: "CNI bridge / overlay networking"
      enforce:
        CONFIG_BRIDGE: y
        CONFIG_VETH: y
        CONFIG_MACVLAN: y
        CONFIG_IPVLAN: y
        CONFIG_VLAN_8021Q: y
        CONFIG_DUMMY: y
        CONFIG_VXLAN: y
        CONFIG_GENEVE: y
        CONFIG_FIB_RULES: y
    ebpf:
      desc: "eBPF / BTF (Cilium, bpftool)"
      enforce:
        CONFIG_BPF: y
        CONFIG_BPF_SYSCALL: y
        CONFIG_BPF_JIT: y
        CONFIG_DEBUG_INFO_BTF: y
        CONFIG_BPF_EVENTS: y
        CONFIG_PERF_EVENTS: y
        CONFIG_NET_CLS_BPF: y
        CONFIG_NET_CLS_ACT: y
        CONFIG_NET_SCH_INGRESS: y
    storage:
      desc: "Filesystems for persistent volumes"
      enforce:
        CONFIG_EXT4_FS: y
        CONFIG_EXT4_FS_POSIX_ACL: y
        CONFIG_XFS_FS: y
        CONFIG_BTRFS_FS: y
        CONFIG_BTRFS_FS_POSIX_ACL: y
        CONFIG_BLK_DEV_NVME: y
    fqdn-proxy:
      desc: "L7 / FQDN policy proxy (TPROXY, xt_socket)"
      enforce:
        CONFIG_NETFILTER_XT_TARGET_TPROXY: y
        CONFIG_NETFILTER_XT_TARGET_CT: y
        CONFIG_NETFILTER_XT_MATCH_SOCKET: y
    bandwidth:
      desc: "Bandwidth manager (FQ packet scheduler)"
      enforce:
        CONFIG_NET_SCH_FQ: y
    iscsi-target:
      desc: "iSCSI target mode (required by Longhorn block storage)"
      enforce:
        CONFIG_CONFIGFS_FS: y
        CONFIG_TARGET_CORE: y
        CONFIG_ISCSI_TARGET: y
        CONFIG_ISCSI_TCP: y
        CONFIG_SCSI_ISCSI_ATTRS: y
        CONFIG_BLK_DEV_SD: y
        CONFIG_SCSI_CONSTANTS: y
    ebpf-cni:
      desc: "eBPF-based CNI networking (Cilium, Hubble, kube-proxy replacement)"
      enforce:
        # Base eBPF requirements
        CONFIG_BPF: y
        CONFIG_BPF_SYSCALL: y
        CONFIG_BPF_JIT: y
        CONFIG_DEBUG_INFO_BTF: y
        CONFIG_BPF_EVENTS: y
        CONFIG_NET_CLS_BPF: y
        CONFIG_NET_CLS_ACT: y
        CONFIG_NET_SCH_INGRESS: y
        # Tunneling and routing
        CONFIG_VXLAN: y
        CONFIG_GENEVE: y
        CONFIG_FIB_RULES: y
        # iptables-based masquerading
        CONFIG_IP_SET: y
        CONFIG_IP_SET_HASH_IP: y
        CONFIG_NETFILTER_XT_SET: y
        CONFIG_NETFILTER_XT_MATCH_COMMENT: y
        # L7 / FQDN policy proxy
        CONFIG_NETFILTER_XT_TARGET_TPROXY: y
        CONFIG_NETFILTER_XT_TARGET_MARK: y
        CONFIG_NETFILTER_XT_TARGET_CT: y
        CONFIG_NETFILTER_XT_MATCH_MARK: y
        CONFIG_NETFILTER_XT_MATCH_SOCKET: y
        # eBPF connection tracking and traffic manipulation
        CONFIG_NET_ACT_CONNMARK: y
        CONFIG_NET_ACT_MIRRED: y
        CONFIG_NET_ACT_SKBEDIT: y
        # Allow unprivileged eBPF (critical for Cilium)
        CONFIG_BPF_UNPRIV_DEFAULT_OFF: n
        # General crypto
        CONFIG_CRYPTO_SHA1: y
        CONFIG_CRYPTO_USER_API_HASH: y
  options:
    version_discoveries:
      - "v6.x"
      - "v7.x"
    file_pattern: "linux-"
    file_suffix: ".tar.xz"

kernel-firecracker:
  type: firecracker
  version: "6.1"
  source: "https://s3.amazonaws.com/spec.ccfc.min"
  resolver: firecracker-s3
  list_url_template: "http://spec.ccfc.min.s3.amazonaws.com/?prefix=firecracker-ci/{ci_version}/{arch}/vmlinux-{version}&list-type=2"
  base_config_url_template: "https://raw.githubusercontent.com/firecracker-microvm/firecracker/main/resources/guest_configs/microvm-kernel-ci-{arch}-{version}.config"
  output_name: vmlinux-firecracker
  build_dir: /tmp/mvmctl/kernel-build
  sha256: null
  sha256_url: null
  config_fragments: []
  parallel_jobs: null
  default_configs: {}
  options:
    s3_version_pattern: "vmlinux-([\\d.]+)"
