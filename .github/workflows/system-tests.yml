name: System Tests

on:
  workflow_dispatch:

jobs:
  system-tests:
    runs-on: kvm-runner
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Run system tests
        run: uv run scripts/run_tests.py --system
