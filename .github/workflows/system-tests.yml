name: System Tests

on:
  workflow_dispatch:

jobs:
  system-tests:
    runs-on: kvm-runner
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          go build -o dist/mvm ./cmd/mvm

      - name: Install test dependencies
        run: pip install pytest

      - name: Run system tests
        run: python3 scripts/run_tests.py --bin dist/mvm
