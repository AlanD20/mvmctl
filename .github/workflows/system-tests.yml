name: System Tests

on:
  workflow_dispatch:

jobs:
  system-tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run system tests
        run: uv run scripts/run_tests.py --system
