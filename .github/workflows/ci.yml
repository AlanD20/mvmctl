name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Tidy
        run: go mod tidy && git diff --exit-code

      - name: Install golines
        run: go install github.com/segmentio/golines@latest

      - name: Check formatting (gofmt)
        run: test -z "$(gofmt -l .)"

      - name: Check line length (golines 120)
        run: |
         golines --max-len=120 --list-files ./internal/ ./pkg/ ./cmd/ 2>&1 | \
         grep . && echo "Line length violations found" && exit 1 || true

      - name: Generate embed placeholders
        run: go generate ./internal/service/vsockagent/...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 3
