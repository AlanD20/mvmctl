name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      working-directory: firecracker-manager
      run: uv sync --group dev

    - name: Lint with Ruff
      working-directory: firecracker-manager
      run: uv run ruff check .

    - name: Typecheck with Mypy
      working-directory: firecracker-manager
      run: uv run mypy .

    - name: Run Pytest
      working-directory: firecracker-manager
      run: uv run pytest tests/unit/ --cov=src/fcm --cov-report=xml --cov-report=term-missing --cov-fail-under=79

    - name: Upload coverage report
      if: matrix.python-version == '3.13'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}
        path: firecracker-manager/coverage.xml
        retention-days: 30

  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v3
      with:
        python-version: "3.13"

    - name: Install pip-audit
      run: uv tool install pip-audit

    - name: Security Audit
      working-directory: firecracker-manager
      run: |
        uv export --format requirements-txt > requirements.txt
        pip-audit -r requirements.txt
