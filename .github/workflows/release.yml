name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Generate embed placeholders
        run: go generate ./internal/service/vsockagent/...

      - name: Test
        run: |
          go mod tidy && git diff --exit-code
          go vet ./...
          go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Install package build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper build-essential rpm

      - name: Build all packages
        run: |
          ./scripts/build-packages.sh --build-binaries --version "${GITHUB_REF_NAME#v}"

      - name: Smoke test
        run: ./dist/mvm --version

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/packages/*
          name: ${{ github.ref_name }}
          body: |
            ## mvmctl ${{ github.ref_name }}

            ### Debian/Ubuntu (.deb)
            - `mvmctl_${{ github.ref_name }}_amd64.deb` — x86_64
            - `mvmctl_${{ github.ref_name }}_arm64.deb` — ARM64

            ### Fedora/RHEL (.rpm)
            - `mvmctl-${{ github.ref_name }}-1.x86_64.rpm` — x86_64
            - `mvmctl-${{ github.ref_name }}-1.aarch64.rpm` — ARM64

            ### Arch Linux
            - `mvmctl-bin-${{ github.ref_name }}-1-x86_64.pkg.tar.zst` — x86_64
            - Also available on AUR as `mvmctl-bin`

            ### Standalone binaries
            - `mvm` — x86_64
            - `mvm-arm64` — ARM64

            ### Install
            ```bash
            # Debian/Ubuntu
            sudo dpkg -i mvmctl_*_amd64.deb

            # Fedora/RHEL
            sudo dnf install mvmctl-*.x86_64.rpm

            # Arch
            sudo pacman -U mvmctl-bin-*.pkg.tar.zst
            ```
