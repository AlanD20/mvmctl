version: "1"
ephemeral: true

# ─── Infrastructure ─────────────────────────────────────────────────────────

network:
  - name: builder
    subnet: "172.30.0.0/24"
    nat: true

key:
  - name: builder
    algorithm: ed25519
    force: true

image:
  - name: ubuntu-builder
    type: ubuntu
    version: "24.04"

kernel:
  - name: krnl-builder
    type: official
    version: 7.0.11
    features: nftables,tuntap,kvm,btrfs

binary:
  - name: fc-binary
    type: firecracker
    version: "1.16.0"

# ═══════════════════════════════════════════════════════════════════════════════
# Single Ubuntu VM — runs the same build-packages.sh as CI
# ═══════════════════════════════════════════════════════════════════════════════

vm:
  - name: pkg-builder
    network: builder
    key: builder
    image: ubuntu-builder
    kernel: krnl-builder
    binary: fc-binary
    disk_size: 8G
    vcpu: 4
    mem: 3G
    depends_on:
      - network:builder
      - key:builder
      - image:ubuntu-builder
      - kernel:krnl-builder
      - binary:fc-binary

# ═══════════════════════════════════════════════════════════════════════════════
# Copy the entire project into the VM, then run the same script CI uses
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# Copy source + binaries into VM
# ═══════════════════════════════════════════════════════════════════════════════

copy:
  - name: copy-scripts
    src: ./scripts
    dest: pkg-builder:/mnt/mvmctl/
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-packaging
    src: ./packaging
    dest: pkg-builder:/mnt/mvmctl/
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-docs
    src: ./docs
    dest: pkg-builder:/mnt/mvmctl/
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-source
    src: ./internal
    dest: pkg-builder:/mnt/mvmctl/
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-pkg
    src: ./pkg
    dest: pkg-builder:/mnt/mvmctl/
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-cmd
    src: ./cmd
    dest: pkg-builder:/mnt/mvmctl/
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-gomod
    src: ./go.mod
    dest: pkg-builder:/mnt/mvmctl/go.mod
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-gosum
    src: ./go.sum
    dest: pkg-builder:/mnt/mvmctl/go.sum
    force: true
    depends_on:
      - vm:pkg-builder

  - name: copy-pkgbuild
    src: ./packaging/PKGBUILD
    dest: pkg-builder:/tmp/arch-PKGBUILD-local
    force: true
    depends_on:
      - vm:pkg-builder

exec:
  - name: build-all
    target: pkg-builder
    user: root
    timeout: 30
    env:
      VERSION: "0.1.0"
    cmd: |
      export HOME=/root && \
      export DEBIAN_FRONTEND=noninteractive && \
      apt-get update -qq && \
      apt-get install -y -qq debhelper build-essential rpm docker.io wget && \
      rm -rf /usr/local/go /usr/lib/go-1.22 && \
      apt-get remove -y -qq golang-go golang-1.22-go && \
      wget -q https://go.dev/dl/go1.26.4.linux-amd64.tar.gz -O /tmp/go.tar.gz && \
      tar -C /usr/local -xzf /tmp/go.tar.gz && \
      ln -sf /usr/local/go/bin/go /usr/local/bin/go && \
      ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt && \
      /usr/local/go/bin/go version && \
      docker pull archlinux:latest 2>&1 | tail -3 && \
      cd /mnt/mvmctl && chmod +x ./scripts/build-packages.sh && \
      PATH=/usr/local/go/bin:$PATH ./scripts/build-packages.sh --build-binaries --version ${VERSION}
    depends_on:
      - copy:copy-scripts
      - copy:copy-packaging
      - copy:copy-docs
      - copy:copy-gomod
      - copy:copy-gosum
      - copy:copy-pkgbuild
      - copy:copy-source
      - copy:copy-pkg
      - copy:copy-cmd

copy:
  - name: retrieve-all
    src: pkg-builder:/mnt/mvmctl/dist/packages/
    dest: ./dist/packages
    force: true
    removes:
      - vm:pkg-builder
      - network:builder
      - key:builder
    depends_on:
      - exec:build-all
