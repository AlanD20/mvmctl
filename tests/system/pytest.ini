[pytest]
markers =
    system: System-level integration tests
    destructive: Tests that destroy host state (run last, serial)
    domain_cli: CLI interaction domain
    domain_config: Configuration domain
    domain_init: Init domain
    domain_cache: Cache management domain
    domain_keys: SSH key domain
    domain_host: Host initialization domain
    domain_invariant: Invariant checks
    domain_network: Network management domain
    domain_volume: Volume management domain
    domain_bin: Binary management domain
    domain_image: Image management domain
    domain_kernel: Kernel management domain
    domain_vm: VM lifecycle domain
    domain_ssh: SSH command domain
    domain_console: Console relay domain
    domain_logs: Logging domain
    domain_cp: Copy file domain
    domain_env: Environment workflow management domain
    domain_run: Internal service run domain
    domain_full_journeys: End-to-end workflow tests
    requires_kvm: Tests requiring KVM/nested virtualization
    requires_network: Tests requiring network access
    kernel_build: Tests that build a custom kernel
    tier2: Tests requiring Tier 2 (nested virtualization) environment
    tier3: Host-direct tests (no runner VM)
    host_reset: Tests that run host reset
    needs_kvm: Tests requiring KVM/nested virtualization (in-test check)
    needs_network: Tests requiring network access (in-test check)
    requires_firecracker_116: Tests requiring Firecracker v1.16 (PCI hotplug)
    slow: Tests that are slow (>30s)
    timeout: Test timeout marker (from pytest-timeout plugin)
