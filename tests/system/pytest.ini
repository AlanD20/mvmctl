[pytest]
markers =
    system: System-level integration tests
    domain_bin: Binary management domain
    domain_cache: Cache management domain
    domain_cli: CLI interaction domain
    domain_config: Configuration domain
    domain_consistency: Consistency checks
    domain_console: Console relay domain
    domain_cp: Copy file domain
    domain_cross_resource: Cross-resource tests
    domain_host: Host initialization domain
    domain_image: Image management domain
    domain_init: Init domain
    domain_invariant: Invariant checks
    domain_json: JSON output tests
    domain_kernel: Kernel management domain
    domain_key: SSH key domain
    domain_leak: Resource leak detection
    domain_logs: Logging domain
    domain_network: Network management domain
    domain_ssh: SSH command domain
    domain_state: State management domain
    domain_vm: VM lifecycle domain
    domain_volume: Volume management domain
    domain_workflow: Workflow tests
    host_reset: Tests that reset host state
    independent_vm: Tests that create independent VMs
    kernel_build: Tests that build kernels from source
    parametrize: Parameterized tests
    requires_firecracker_: Tests requiring a specific Firecracker feature
    requires_kvm: Tests that require KVM/nested virtualization
    requires_network: Tests that require network access
    serial: Tests that must run sequentially (not in parallel)
    shared_vm: Tests sharing a VM fixture
    slow: Tests that take longer than usual
    usefixtures: Tests that use specific fixtures
