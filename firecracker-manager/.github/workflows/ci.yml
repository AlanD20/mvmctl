name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: firecracker-manager
        run: uv sync --group dev

      - name: Run pip-audit security scan
        working-directory: firecracker-manager
        run: |
          uv run pip-audit --desc --format=json | tee pip-audit-results.json
          # Run audit to check for any vulnerabilities (excluding known issues without fixes)
          uv run pip-audit --desc

      - name: Upload pip-audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results-${{ matrix.os }}
          path: firecracker-manager/pip-audit-results.json
          retention-days: 30

      - name: Lint with ruff
        working-directory: firecracker-manager
        run: uv run ruff check src/

      - name: Check formatting with ruff
        working-directory: firecracker-manager
        run: uv run ruff format --check src/

      - name: Type check with mypy
        working-directory: firecracker-manager
        run: uv run mypy src/

      - name: Run tests
        working-directory: firecracker-manager
        run: uv run pytest tests/ -v --tb=short --cov=src/fcm --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: firecracker-manager/coverage.xml
          retention-days: 30
