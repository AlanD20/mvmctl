name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # For trusted publishing to PyPI

jobs:
  test:
    name: Test with Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: firecracker-manager
        run: uv sync --group dev

      - name: Run tests with coverage gate
        working-directory: firecracker-manager
        run: uv run pytest tests/ -v --tb=short --cov=src/fcm --cov-report=term-missing --cov-fail-under=79

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: firecracker-manager
        run: uv sync --group dev && uv pip install pyinstaller

      - name: Run tests
        working-directory: firecracker-manager
        run: uv run pytest tests/ -v --tb=short

      - name: Build binary
        working-directory: firecracker-manager
        run: uv run pyinstaller --onefile --name fcm src/fcm/main.py

      - name: Smoke test binary
        working-directory: firecracker-manager
        run: |
          ./dist/fcm --version
          ./dist/fcm --help

      - name: Generate SHA256 checksum
        working-directory: firecracker-manager/dist
        run: |
          sha256sum fcm > fcm.sha256
          cat fcm.sha256

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcm-linux-${{ matrix.os }}
          path: |
            firecracker-manager/dist/fcm
            firecracker-manager/dist/fcm.sha256

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firecracker-manager/dist/fcm
            firecracker-manager/dist/fcm.sha256
          name: Release ${{ github.ref_name }}

  publish-pypi:
    name: Publish to PyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: firecracker-manager
        run: uv sync --group dev

      - name: Build wheel and sdist
        working-directory: firecracker-manager
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: firecracker-manager/dist/