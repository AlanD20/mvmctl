name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: firecracker-manager
        run: uv sync --group dev && uv pip install pyinstaller

      - name: Run tests
        working-directory: firecracker-manager
        run: uv run pytest tests/ -v --tb=short

      - name: Build binary
        working-directory: firecracker-manager
        run: uv run pyinstaller --onefile --name fcm src/fcm/main.py

      - name: Smoke test binary
        working-directory: firecracker-manager
        run: |
          ./dist/fcm --version
          ./dist/fcm --help

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcm-linux-${{ matrix.os }}
          path: firecracker-manager/dist/fcm

      - name: Create GitHub release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: firecracker-manager/dist/fcm
          name: fcm-linux-${{ matrix.os }}
