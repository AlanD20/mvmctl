# Firecracker Manager Default Configuration
# CLI flags override these values

firecracker:
  binary: /usr/local/bin/firecracker
  socket_dir: /tmp/fcm/sockets
  run_dir: /tmp/fcm/run
  log_dir: /tmp/fcm/logs

vm_defaults:
  vcpu_count: 2
  mem_size_mib: 2048
  network_interface: eth0
  boot_args: "console=ttyS0 reboot=k panic=1 pci=off"
  disk_size: "2G"
  enable_api_socket: false
  enable_pci: false
  lsm_flags: "landlock,lockdown,yama,integrity,selinux,bpf"

network:
  single_vm:
    tap_dev: "fcm-tap0"
    guest_ip: "10.10.0.2"
    host_ip: "10.10.0.1"
    mask: "255.255.255.252"
    mac: "02:FC:00:00:00:01"
  vm_network:
    bridge_name: "fcm-br0"
    bridge_ip: "10.10.0.1/24"
    guest_ip_start: "10.10.0.2"
    guest_ip_end: "10.10.0.254"
    tap_prefix: "fcm"

paths:
  assets_dir: "../assets"
  single_vm_dir: "../single-vm"
